{% extends "base.html" %}
{% block title %}Edit Task{% endblock %}
{% block content %}
<section class="card">
    <h2>Edit Task</h2>
    <form action="{{ url_for('edit_task', task_id=task.id) }}" method="post" class="task-form">
        <label>Title<input type="text" name="title" value="{{ task.title }}" required></label>
        <label>Description<textarea name="description" rows="3">{{ task.description }}</textarea></label>
        <label>Status
            <select name="status">
                {% for option in ['Pending', 'In Progress', 'Completed'] %}
                <option {% if task.status == option %}selected{% endif %}>{{ option }}</option>
                {% endfor %}
            </select>
        </label>
        <label>Due Date<input type="date" name="due_date" value="{{ task.due_date }}"></label>
        <button type="submit">Save Changes</button>
        <a class="secondary" href="{{ url_for('index') }}">Cancel</a>
    </form>
</section>
{% endblock %}
