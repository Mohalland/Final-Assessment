services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - '8000:5000'
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql://taskuser:taskpass@db:5432/tasks
    volumes:
      - ./source_code:/app
    restart: unless-stopped

  db:
    image: postgres:16
    environment:
      POSTGRES_DB: tasks
      POSTGRES_USER: taskuser
      POSTGRES_PASSWORD: taskpass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U taskuser -d tasks']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
